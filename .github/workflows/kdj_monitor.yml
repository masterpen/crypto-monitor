name: Hourly KDJ Monitor

on:
  schedule:
    # 每小时的第10分钟触发（例如 1:10, 2:10），比整点错开一点以避免API高峰限制
    - cron: '10 * * * *'
  workflow_dispatch:      # 允许你在 GitHub 页面手动触发执行

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp pandas
          
      - name: Run KDJ Monitor Script
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
        run: python monitor_kdj.py
